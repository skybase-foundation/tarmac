name: E2E Tests (Pool)

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      shards:
        description: 'Number of shards'
        required: false
        default: '8'
        type: string
      workers_per_shard:
        description: 'Workers per shard'
        required: false
        default: '2'
        type: string
      networks:
        description: 'Networks to test (comma-separated)'
        required: false
        default: 'mainnet,base,arbitrum,optimism,unichain'
        type: string

concurrency:
  group: e2e-pool-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Job to restore pool VNets and validate before shards run
  setup-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      pool-ready: ${{ steps.pool-status.outputs.status }}

    env:
      VITE_ENV_NAME: development
      VITE_TERMS_LINK: '[{"url":"https://legal-terms","name":"Terms of Use"}]'
      VITE_BATCH_TX_ENABLED: 'true'
      VITE_USE_MOCK_WALLET: 'true'
      VITE_SKIP_AUTH_CHECK: 'true'
      VITE_GEO_BYPASS: 'true'
      VITE_PROXY_ORIGIN: 'https://staging-proxy.sky.money'
      FUND_NETWORKS: ${{ github.event.inputs.networks || 'mainnet,base,arbitrum,optimism,unichain' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore pool VNet data from repo variables
        id: restore-pool
        run: |
          # VNET_POOL_DATA and VNET_SNAPSHOT_DATA are repo-level variables
          if [ -n "$VNET_POOL_DATA" ] && [ -n "$VNET_SNAPSHOT_DATA" ]; then
            echo "Writing VNet data from repo variables..."

            echo "$VNET_POOL_DATA" > tenderlyTestnetData.json
            echo "$VNET_SNAPSHOT_DATA" > apps/webapp/src/test/e2e/persistent-vnet-snapshots.json

            echo "have_pool=true" >> $GITHUB_OUTPUT
            echo "VNet data:"
            cat tenderlyTestnetData.json | jq -r '.[].NETWORK' | tr '\n' ', '
            echo ""
            echo "Snapshots:"
            cat apps/webapp/src/test/e2e/persistent-vnet-snapshots.json | jq -r 'keys[]' | tr '\n' ', '
            echo ""
            echo "Pool VNet data restored"
          else
            echo "have_pool=false" >> $GITHUB_OUTPUT
            echo "No pool data found in repo variables."
            echo "Run: pnpm vnet:pool:provision:store (or the Provision VNet Pool workflow)"
          fi
        env:
          VNET_POOL_DATA: ${{ vars.VNET_POOL_DATA }}
          VNET_SNAPSHOT_DATA: ${{ vars.VNET_SNAPSHOT_DATA }}

      - name: Validate pool VNets
        id: validate-pool
        if: steps.restore-pool.outputs.have_pool == 'true'
        run: |
          echo "Validating pool VNets..."
          cd apps/webapp && npx tsx src/test/e2e/validate-vnets.ts
        env:
          TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}
        continue-on-error: true

      - name: Pool status
        id: pool-status
        run: |
          if [ "${{ steps.restore-pool.outputs.have_pool }}" = "true" ] && [ "${{ steps.validate-pool.outcome }}" = "success" ]; then
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "Pool VNets are healthy!"
          else
            echo "status=unavailable" >> $GITHUB_OUTPUT
            echo "Pool VNets are not available or unhealthy."
            echo "Falling back to fresh VNet provisioning..."
          fi

      - name: Fallback - Create fresh VNets
        if: steps.pool-status.outputs.status == 'unavailable'
        run: |
          echo "Creating fresh VNets (fallback)..."
          pnpm run vnet:fork:ci
          echo "Fresh VNets created"
        env:
          TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}

      - name: Fallback - Fund accounts and create snapshots
        if: steps.pool-status.outputs.status == 'unavailable'
        run: |
          echo "Funding all test accounts on all networks..."
          cd apps/webapp
          pnpm e2e:fund

          if [ ! -f "src/test/e2e/persistent-vnet-snapshots.json" ]; then
            echo "Snapshots were not created!"
            exit 1
          fi
          echo "Snapshots created and verified"
        env:
          TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}

      - name: Upload VNet data for shards
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vnet-data
          path: |
            tenderlyTestnetData.json
            apps/webapp/src/test/e2e/persistent-vnet-snapshots.json
          retention-days: 1

      - name: Verify setup is ready
        run: |
          if [ -f "tenderlyTestnetData.json" ] && [ -f "apps/webapp/src/test/e2e/persistent-vnet-snapshots.json" ]; then
            echo "VNets are ready for sharded tests"
          else
            echo "VNet files are missing!"
            exit 1
          fi

  # Run tests in shards
  test-shards:
    needs: setup-pool
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    env:
      VITE_ENV_NAME: development
      VITE_TERMS_LINK: '[{"url":"https://legal-terms","name":"Terms of Use"}]'
      VITE_BATCH_TX_ENABLED: 'true'
      VITE_USE_MOCK_WALLET: 'true'
      VITE_SKIP_AUTH_CHECK: 'true'
      VITE_GEO_BYPASS: 'true'
      VITE_PROXY_ORIGIN: 'https://staging-proxy.sky.money'
      PLAYWRIGHT_SHARD_INDEX: ${{ matrix.shard }}
      PLAYWRIGHT_SHARD_TOTAL: ${{ github.event.inputs.shards || '8' }}
      TEST_WORKERS: ${{ github.event.inputs.workers_per_shard || '2' }}
      FUND_NETWORKS: ${{ github.event.inputs.networks || 'mainnet,base,arbitrum,optimism,unichain' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -F webapp exec playwright install --with-deps chromium

      - name: Download VNet data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vnet-data

      - name: Verify VNet files
        run: |
          echo "Verifying VNet files for shard ${{ matrix.shard }}..."
          echo "Checking tenderlyTestnetData.json:"
          ls -lh tenderlyTestnetData.json
          echo "Checking persistent-vnet-snapshots.json:"
          ls -lh apps/webapp/src/test/e2e/persistent-vnet-snapshots.json
          echo "VNet files ready"

      - name: Run E2E tests (Shard ${{ matrix.shard }}/${{ github.event.inputs.shards || '8' }})
        run: |
          echo "Running shard ${{ matrix.shard }} of ${{ github.event.inputs.shards || '8' }}"
          echo "Workers per shard: $TEST_WORKERS"
          echo "Pool status: ${{ needs.setup-pool.outputs.pool-ready }}"

          chmod +x ./apps/webapp/run-tests-with-retry.sh
          cd apps/webapp && ./run-tests-with-retry.sh
        env:
          TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}

      - name: Upload test results (if failed)
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shard-${{ matrix.shard }}-test-results-${{ github.run_id }}
          path: |
            apps/webapp/playwright-report/
            apps/webapp/test-results/
            apps/webapp/test-results.json
          retention-days: 7

      - name: Upload test traces (if failed)
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shard-${{ matrix.shard }}-test-traces-${{ github.run_id }}
          path: apps/webapp/test-results/
          retention-days: 3

  # Aggregate results from all shards
  aggregate-results:
    needs: [setup-pool, test-shards]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all shard results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: shard-*-test-results-${{ github.run_id }}
          path: all-results
        continue-on-error: true

      - name: Test Summary
        run: |
          echo "## E2E Test Summary (Pool)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Pool status**: ${{ needs.setup-pool.outputs.pool-ready }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Shards**: ${{ github.event.inputs.shards || '8' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workers per Shard**: ${{ github.event.inputs.workers_per_shard || '2' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Networks**: ${{ github.event.inputs.networks || 'mainnet,base,arbitrum,optimism,unichain' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.setup-pool.outputs.pool-ready }}" = "ready" ]; then
            echo "- **Mode**: Pool VNets (fast - snapshot revert)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Mode**: Fresh VNets (fallback - full provisioning)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-shards.result }}" == "success" ]; then
            echo "### All shards passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Some shards failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check individual shard artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

  # Cleanup fresh VNets only (never delete pool VNets)
  cleanup:
    needs: [setup-pool, test-shards, aggregate-results]
    if: always() && needs.setup-pool.outputs.pool-ready == 'unavailable'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download VNet data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vnet-data
        continue-on-error: true

      - name: Cleanup fresh VNets (fallback only)
        run: |
          echo "Cleaning up fresh VNets (not pool VNets)..."
          pnpm run vnet:delete:all:ci || echo "VNet cleanup failed, continuing..."
        env:
          TENDERLY_API_KEY: ${{ secrets.TENDERLY_API_KEY }}
